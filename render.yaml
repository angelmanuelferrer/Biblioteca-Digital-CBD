services:
  - type: web
    name: biblioteca-digital-cbd
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        fromService:
          type: web
          name: biblioteca-digital-cbd
          property: host
